# Activate alongside the topology profile: SPRING_PROFILES_ACTIVE=session,cloud
# (or overlap,cloud). Bootstrap servers come from SPRING_KAFKA_BOOTSTRAP_SERVERS,
# injected by ECS from the MSK Serverless cluster's IAM endpoint.
spring:
  kafka:
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: AWS_MSK_IAM
      sasl.jaas.config: software.amazon.msk.auth.iam.IAMLoginModule required;
      sasl.client.callback.handler.class: software.amazon.msk.auth.iam.IAMClientCallbackHandler
