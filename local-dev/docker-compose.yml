services:
  # ---- Kafka (single-node KRaft, no Zookeeper) -------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"          # host apps connect here
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      # containers reach kafka:29092; your host apps reach localhost:9092
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  # ---- Create the two topics once Kafka is up --------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [kafka]
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'waiting for kafka...';
      until kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do sleep 2; done;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic note-events  --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic chord-events --partitions 3 --replication-factor 1;
      echo 'topics ready';
      "

  # ---- Web UI to watch topics/messages: http://localhost:8085 ----------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on: [kafka]
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

  # ---- DynamoDB Local: http://localhost:8000 ---------------------------------
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  # ---- Create the two DynamoDB tables ----------------------------------------
  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on: [dynamodb]
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      until aws dynamodb list-tables --endpoint-url http://dynamodb:8000 >/dev/null 2>&1; do sleep 2; done;
      aws dynamodb create-table --endpoint-url http://dynamodb:8000 --table-name note-events \
        --attribute-definitions AttributeName=sourceId,AttributeType=S AttributeName=timestamp,AttributeType=N \
        --key-schema AttributeName=sourceId,KeyType=HASH AttributeName=timestamp,KeyType=RANGE \
        --billing-mode PAY_PER_REQUEST 2>/dev/null || true;
      aws dynamodb create-table --endpoint-url http://dynamodb:8000 --table-name chord-events \
        --attribute-definitions AttributeName=sourceId,AttributeType=S AttributeName=startTs,AttributeType=N \
        --key-schema AttributeName=sourceId,KeyType=HASH AttributeName=startTs,KeyType=RANGE \
        --billing-mode PAY_PER_REQUEST 2>/dev/null || true;
      echo 'tables ready';
      "
